<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель преподавателя</title>
    <style>
        :root {
            --font-headers: 'Montserrat', sans-serif;
            --font-main: 'Fredoka', sans-serif;
            --theme-color: #1a5f7a;
            --accent-color: #008080;
        }

        body {
            font-family: var(--font-main);
            background: radial-gradient(circle at 50% -20%, #ffffff 20%, #f3fdfd 60%, #cff4f6 100%);
            color: #334155;
            line-height: 1.7;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-family: var(--font-headers);
            color: var(--theme-color);
            text-align: center;
            font-weight: 900;
            font-size: 3rem;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .module-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 4px solid #ffffff;
            box-shadow: 0 20px 40px rgba(0, 128, 128, 0.08);
            border-radius: 32px;
            padding: 2rem;
            text-decoration: none;
            color: #334155;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            aspect-ratio: 4 / 3;
            text-align: center;
        }

        .module-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
        }

        .module-card h3 {
            font-family: var(--font-headers);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--theme-color);
        }

        .module-card p {
            margin: 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Панель преподавателя</h1>

    <div class="grid">
        <a href="https://nazarina.github.io/scratch/teacher's_office/index.html" class="module-card">
            <h3>Модуль 1</h3>
            <p>Основы и Scratch</p>
        </a>
        <a href="module2.html" class="module-card">
            <h3>Модуль 2</h3>
            <p>Циклы и логика</p>
        </a>
        <a href="module3.html" class="module-card">
            <h3>Модуль 3</h3>
            <p>Графика и дизайн</p>
        </a>
        <a href="module4.html" class="module-card">
            <h3>Модуль 4</h3>
            <p>Координаты и путь</p>
        </a>
        <a href="module5.html" class="module-card">
            <h3>Модуль 5</h3>
            <p>События и связь</p>
        </a>
        <a href="module6.html" class="module-card">
            <h3>Модуль 6</h3>
            <p>Проект: Киностудия</p>
        </a>
    </div>
</div>

</body>
</html>
